<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MathBOT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo logo-center" style="margin-bottom:1rem;">
          <img src="logo.png" alt="MathBOT" class="logo-img logo-img-lg">
        </a>
        <h1>Welcome Back</h1>
        <p>Sign in to continue earning</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register</a></p>
        <p class="mt-1"><button class="btn-icon" data-theme-toggle>🌓</button></p>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
