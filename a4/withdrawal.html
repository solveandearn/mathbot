<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw — MathBOT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="withdrawal" class="page">
  <header class="header">
    <div class="header-inner">
      <a href="dashboard.html" class="logo"><img src="logo.png" alt="MathBOT" class="logo-img"></a>
      <div class="header-actions">
        <button class="btn-icon" data-theme-toggle>🌓</button>
        <button class="btn btn-outline btn-sm" data-logout>Logout</button>
      </div>
    </div>
  </header>

  <main class="container content-area">
    <h2 class="mb-2">Withdraw Earnings</h2>

    <div class="card mb-2">
      <div class="card-title">Available Balance</div>
      <div class="card-value" id="available-balance">₱0.00</div>
      <p class="form-hint mt-1">Minimum withdrawal: ₱100.00 via GCash</p>
    </div>

    <div class="section">
      <div class="section-title">Request Withdrawal</div>
      <div class="card">
        <form id="withdrawal-form">
          <div class="form-group">
            <label for="amount">Amount (PHP)</label>
            <input type="number" id="amount" name="amount" min="100" step="0.01" required placeholder="100.00">
          </div>
          <div class="form-group">
            <label for="gcashName">GCash Name</label>
            <input type="text" id="gcashName" name="gcashName" required placeholder="Account name">
          </div>
          <div class="form-group">
            <label for="gcashNumber">GCash Number</label>
            <input type="tel" id="gcashNumber" name="gcashNumber" required placeholder="09171234567" pattern="09[0-9]{9}">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Submit Request</button>
        </form>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Withdrawal History</div>
      <div class="card" id="withdrawal-history"></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" data-nav="dashboard"><span class="nav-icon">📊</span>Dashboard</a>
    <a href="game.html" data-nav="game"><span class="nav-icon">🎮</span>Play</a>
    <a href="withdrawal.html" data-nav="withdrawal"><span class="nav-icon">💳</span>Withdraw</a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
